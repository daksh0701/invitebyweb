<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBW Studio | InviteByWeb</title><link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><style>
:root {
  --bg: #0a0a0a;
  --glass: rgba(255,255,255,0.08);
  --text: #ffffff;
  --sub: #a1a1aa;
  --accent: #7c7cff;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  position:sticky;
  top:0;
}

header h2 {
  font-weight:600;
}

nav a {
  color: var(--sub);
  margin-left:25px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover {
  color:white;
}

.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1 {
  font-size:64px;
  font-weight:700;
  background: linear-gradient(to right, #fff, #7c7cff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p {
  margin-top:20px;
  color:var(--sub);
  font-size:18px;
}

.btn {
  margin-top:30px;
  padding:14px 28px;
  border-radius:30px;
  background: linear-gradient(135deg,#7c7cff,#5a54ff);
  color:white;
  text-decoration:none;
  display:inline-block;
  transition:0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.section {
  padding:100px 60px;
  text-align:center;
}

.section h2 {
  font-size:40px;
  margin-bottom:20px;
}

.templates {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  margin-top:50px;
}

.card {
  backdrop-filter: blur(20px);
  background: var(--glass);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content {
  padding:20px;
}

.card h3 {
  margin-bottom:10px;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  padding:30px;
  border-radius:20px;
  width:320px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

#countdown {
  font-size:32px;
  margin-top:20px;
  color:var(--accent);
}

footer {
  padding:40px;
  text-align:center;
  color:var(--sub);
}

</style></head><body><header>
  <h2>IBW Studio</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#templates">Templates</a>
    <a onclick="openLogin()">Login</a>
  </nav>
</header><section class="hero">
  <div>
    <h1>Make Your Digital Invitation </h1>
    <p>Minimal. Elegant. Powerful.</p>
    <a href="#templates" class="btn">Explore</a>
  </div>
</section><section class="section" id="templates">
  <h2>Templates</h2>  <div class="templates">
    <div class="card">
      <img src="https://picsum.photos/400/200?1">
      <div class="card-content">
        <h3>Wedding</h3>
        <p>Luxury design</p>
      </div>
    </div><div class="card">
  <img src="https://picsum.photos/400/200?2">
  <div class="card-content">
    <h3>Birthday</h3>
    <p>Modern style</p>
  </div>
</div>

<div class="card">
  <img src="https://picsum.photos/400/200?3">
  <div class="card-content">
    <h3>Engagement</h3>
    <p>Clean elegance</p>
  </div>
</div>

  </div>
</section><section class="section">
  <h2>Countdown</h2>
  <input type="date" id="dateInput">
  <button class="btn" onclick="startCountdown()">Start</button>
  <div id="countdown"></div>
</section><div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Login</h3>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button class="btn" onclick="closeLogin()">Login</button>
  </div>
</div><footer>
  <p>© 2026 IBW Studio</p>
</footer><script>
function openLogin(){document.getElementById('loginModal').style.display='flex'}
function closeLogin(){document.getElementById('loginModal').style.display='none'}

function startCountdown(){
 let date=new Date(document.getElementById('dateInput').value).getTime();
 setInterval(function(){
 let now=new Date().getTime();
 let gap=date-now;
 let d=Math.floor(gap/(1000*60*60*24));
 let h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((gap%(1000*60*60))/(1000*60));
 let s=Math.floor((gap%(1000*60))/1000);
 document.getElementById('countdown').innerHTML=d+'d '+h+'h '+m+'m '+s+'s';
 },1000);
}
</script></body>
</html>
